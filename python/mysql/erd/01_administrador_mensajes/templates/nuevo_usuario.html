<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login y Registro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ddd;
    margin:0;
}

/* CONTENEDOR PRINCIPAL */
.container{
    width:900px;
    margin:50px auto;
    background:white;
    border:2px solid black;
    padding:40px;
}

/* DOS COLUMNAS */
.forms{
    display:flex;
    justify-content:space-between;
    gap:60px;
}

/* CADA BLOQUE */
.box{
    width:45%;
}

h2{
    margin-bottom:30px;
}

/* FILAS */
.form-group{
    display:flex;
    align-items:center;
    margin-bottom:15px;
}

label{
    width:120px;
}

input{
    flex:1;
    padding:8px;
    border:2px solid black;
}

/* BOTONES */
button{
    margin-top:15px;
    padding:10px 20px;
    border:2px solid black;
    background:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#eee;
}
</style>
</head>

<body>

<div class="container">

    <div class="forms">

        <!-- LOGIN -->
        <div class="box">
            <h2>Inicio de Sesión</h2>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password">
            </div>

            <button>Iniciar Sesión</button>
        </div>

        <!-- REGISTRO -->
        <div class="box">
            <h2>Registro</h2>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Conf. Contraseña</label>
                <input type="password">
            </div>

            <button>Registrar</button>
        </div>

    </div>

</div>

</body>
</html>
